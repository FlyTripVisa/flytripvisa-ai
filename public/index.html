<!doctype html>
<html lang="en">
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Trip Visa - AI 🐲 Robot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10,10,10,0.95); position: fixed; top: 0; left: 0; right: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .chat-area { flex: 1; overflow-y: auto; padding: 80px 20px 80px; display: flex; flex-direction: column; gap: 12px; }
        .input-container { padding: 15px 20px; background: rgba(10,10,10,0.95); position: fixed; bottom: 0; left: 0; right: 0; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .input-wrapper { position: relative; width: 100%; }
        .input-box { background-color: #1f2937; border-radius: 9999px; padding: 14px 20px; width: 100%; border: 1px solid rgba(255, 255, 255, 0.05); color: white; outline: none; padding-right: 50px; font-size: 16px; }
        .send-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: #3b82f6; border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 80%; margin: 6px 0; }
        .user-message { background: #3b82f6; color: white; margin-left: auto; }
        .ai-message { background: #1f2937; color: #f3f4f6; margin-right: auto; }
        #typing-indicator { display: none; padding: 10px; color: #6b7280; font-size: 12px; }
        #typing-indicator.visible { display: block; }
    </style>
	</head>
	<body>
		<header>
			<h1>Cloudflare AI Chat</h1>
			<p>Powered by Cloudflare Workers AI</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>
						Hello! I'm an LLM chat app powered by Cloudflare Workers AI. How can
						I help you today?
					</p>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				AI is thinking...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Type your message here..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2025</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
	</body>
</html>
